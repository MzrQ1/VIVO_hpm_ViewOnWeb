<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIVO手表心率监测</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>❤️ VIVO手表心率监测</h1>
            <p class="subtitle">实时显示心率信号</p>
        </header>

        <div class="control-panel">
            <button id="scanBtn" class="btn btn-primary">查找设备</button>
            <button id="connectBtn" class="btn btn-primary" disabled>连接设备</button>
            <button id="disconnectBtn" class="btn btn-secondary" disabled>断开连接</button>
            <div class="status-indicator">
                <span id="statusText">未连接</span>
            </div>
        </div>

        <div class="main-content">
            <div class="heart-rate-display">
                <div class="heart-rate-value">
                    <span id="heartRate">--</span>
                    <span class="unit">bpm</span>
                </div>
                <div class="heart-rate-label">当前心率</div>
                <div class="heart-beat-icon" id="heartBeat">
                    <svg viewBox="0 0 24 24" width="60" height="60">
                        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="#ff4757"/>
                    </svg>
                </div>
            </div>

            <div class="chart-container">
                <canvas id="heartRateChart"></canvas>
            </div>

            <div class="info-panel">
                <div class="info-item">
                    <span class="info-label">设备名称:</span>
                    <span class="info-value" id="deviceName">--</span>
                </div>
                <div class="info-item">
                    <span class="info-label">信号强度:</span>
                    <span class="info-value" id="signalStrength">-- dBm</span>
                </div>
                <div class="info-item">
                    <span class="info-label">连接状态:</span>
                    <span class="info-value" id="connectionState">未连接</span>
                </div>
                <div class="info-item">
                    <span class="info-label">数据包数:</span>
                    <span class="info-value" id="packetCount">0</span>
                </div>
            </div>
        </div>

        <div class="console-panel">
            <div class="console-header">日志输出</div>
            <div class="console-content" id="consoleOutput"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="ble-manager.js"></script>
    <script src="heart-rate-display.js"></script>
    <script src="chart-manager.js"></script>
    <script src="app.js"></script>
</body>
</html>
